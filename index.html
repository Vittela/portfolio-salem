<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salem Designs</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="components/card.js"></script>
</head>

<body>
    <div class="page">
        <header class="header">
            <h1>Salem Nicholas</h1>
            <p>Designer gráfico</p>
        </header>

        <main class="main">
            <section class="my-card">
                <one-card>

                    Sobre mim
                </one-card>
            </section>

            <section class="my-card">
                <one-card>

                    Minhas zines
                </one-card>
            </section>

            <section class="my-card">
                <one-card>
                    <img slot="icon" src="images/icons/generic.png" width="50" height="50" />
                    Meus posts
                </one-card>
            </section>

            <section class="my-card">
                <one-card>

                    Logos e identidades
                </one-card>
            </section>
        </main>

        <footer class="footer">
            <img src="images/icons/instagram.png" alt="img">
            <img src="images/icons/linkedin.png" alt="img">
            <img src="images/icons/whatsapp.png" alt="img">
        </footer>
    </div>
</body>

</html>
